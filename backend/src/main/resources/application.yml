spring:
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:itnews}
    username: ${PGUSER:itnews}
    password: ${PGPASSWORD:itnews}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    open-in-view: false
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=1800s

server:
  port: ${PORT:8080}

app:
  groq:
    api-key: ${GROQ_API_KEY:}
  resend:
    api-key: ${RESEND_API_KEY:}
  admin:
    secret: ${ADMIN_SECRET:}
  gemini:
    api-key: ${GEMINI_API_KEY:}
  naver:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
  cors:
    allowed-origin: ${ALLOWED_ORIGIN:http://localhost:3000}
  crawler:
    articles-per-source: 8

scheduling:
  enabled: ${SCHEDULING_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
