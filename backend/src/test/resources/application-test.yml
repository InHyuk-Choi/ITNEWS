spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    open-in-view: false
  cache:
    type: none  # 테스트 시 캐시 비활성화

scheduling:
  enabled: false  # 테스트 중 크롤러 자동 실행 방지

app:
  gemini:
    api-key: ""
  naver:
    client-id: ""
    client-secret: ""
  cors:
    allowed-origin: http://localhost:3000
  crawler:
    articles-per-source: 8
